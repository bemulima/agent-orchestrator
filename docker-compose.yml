services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-course_dev_orchestrator}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-course_dev_orchestrator}"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.28.1
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/docker.yaml
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 15

  temporal-ui:
    image: temporalio/ui:2.40.1
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "${TEMPORAL_UI_PORT:-8233}:8080"

  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["serve"]
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
    environment: &orchestrator_environment
      HTTP_PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-course_dev_orchestrator}?sslmode=disable
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-10}
      TEMPORAL_HOST_PORT: temporal:7233
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-course-dev-orchestrator}
      REPOSITORY_ALLOWED_ROOTS: ${REPOSITORY_ALLOWED_ROOTS:-/projects}
      REPOSITORY_STORAGE_PATH: ${REPOSITORY_STORAGE_PATH:-/data/repositories}
      WORKTREE_STORAGE_PATH: ${WORKTREE_STORAGE_PATH:-/data/worktrees}
      DISCOVERY_MAX_FILES: ${DISCOVERY_MAX_FILES:-10000}
      DISCOVERY_MAX_FILE_BYTES: ${DISCOVERY_MAX_FILE_BYTES:-1048576}
      DISCOVERY_MAX_TOTAL_BYTES: ${DISCOVERY_MAX_TOTAL_BYTES:-20971520}
      DISCOVERY_MAX_DEPTH: ${DISCOVERY_MAX_DEPTH:-24}
      ONBOARDING_MAX_FILE_BYTES: ${ONBOARDING_MAX_FILE_BYTES:-2097152}
      ONBOARDING_MAX_TOTAL_BYTES: ${ONBOARDING_MAX_TOTAL_BYTES:-10485760}
      ONBOARDING_AUTHOR_NAME: ${ONBOARDING_AUTHOR_NAME:-Course Dev Orchestrator}
      ONBOARDING_AUTHOR_EMAIL: ${ONBOARDING_AUTHOR_EMAIL:-orchestrator@local.invalid}
      MAX_TASK_ATTEMPTS: ${MAX_TASK_ATTEMPTS:-3}
      MAX_REVIEW_ATTEMPTS: ${MAX_REVIEW_ATTEMPTS:-2}
      MAX_REPLANS: ${MAX_REPLANS:-2}
      MAX_PARALLEL_TASKS: ${MAX_PARALLEL_TASKS:-3}
      MAX_REQUIRED_TASK_DEPTH: ${MAX_REQUIRED_TASK_DEPTH:-3}
      GITLAB_BASE_URL: ${GITLAB_BASE_URL:-}
      GITLAB_TOKEN: ${GITLAB_TOKEN:-}
      GITLAB_CONTROL_PROJECT: ${GITLAB_CONTROL_PROJECT:-}
      GITLAB_WEBHOOK_SIGNING_TOKEN: ${GITLAB_WEBHOOK_SIGNING_TOKEN:-}
      GITLAB_WEBHOOK_SECRET: ${GITLAB_WEBHOOK_SECRET:-}
      GITLAB_DRY_RUN: ${GITLAB_DRY_RUN:-true}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_USER_IDS: ${TELEGRAM_ALLOWED_USER_IDS:-}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:-}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_POLL_TIMEOUT: ${TELEGRAM_POLL_TIMEOUT:-30}
      TELEGRAM_CALLBACK_TTL: ${TELEGRAM_CALLBACK_TTL:-900}
      CODEX_RUNNER_COMMAND: ${CODEX_RUNNER_COMMAND:-node runner/dist/index.js}
      CODEX_MODEL_FAST: ${CODEX_MODEL_FAST:-}
      CODEX_MODEL_STANDARD: ${CODEX_MODEL_STANDARD:-}
      CODEX_MODEL_DEEP: ${CODEX_MODEL_DEEP:-}
      CODEX_MODEL_REVIEW: ${CODEX_MODEL_REVIEW:-}
    ports:
      - "${HTTP_PORT:-8080}:8080"
    volumes:
      - orchestrator_data:/data
      - type: bind
        source: ${PROJECTS_HOST_ROOT:-.}
        target: /projects
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["worker"]
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
    environment:
      <<: *orchestrator_environment
      CODEX_API_KEY: ${CODEX_API_KEY:-}
      CODEX_HOME: /data/codex
    volumes:
      - orchestrator_data:/data
      - type: bind
        source: ${PROJECTS_HOST_ROOT:-.}
        target: /projects

volumes:
  postgres_data:
  orchestrator_data:
